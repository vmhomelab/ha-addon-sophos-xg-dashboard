name: Sophos XG/SFOS Dashboard
slug: sophos_xg_dashboard
description: Home Assistant dashboard for Sophos XG/SFOS XML API stats, firewall rules, and NAT rules
version: "0.1.0"
url: https://github.com/vmhomelab/ha-addon-sophos-xg-dashboard
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8000
panel_icon: mdi:shield-home
panel_title: Sophos Firewall
ports:
  8000/tcp: null
map:
  - addon_config:rw
options:
  sophos_host: "https://192.0.2.10:4444"
  verify_ssl: false
  username: ""
  password: ""
  request_timeout: 15
  refresh_interval: 60
schema:
  sophos_host: str
  verify_ssl: bool
  username: password
  password: password
  request_timeout: int
  refresh_interval: int
